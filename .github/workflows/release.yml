name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  ORT_VERSION: "1.19.2"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
            ort_asset: onnxruntime-linux-x64-1.19.2.tgz
            plugin: reaper_stem_separation_plugin.so
          - os: macos-14
            platform: macos-arm64
            ort_asset: onnxruntime-osx-arm64-1.19.2.tgz
            plugin: reaper_stem_separation_plugin.dylib
          - os: windows-2022
            platform: windows-x64
            ort_asset: onnxruntime-win-x64-1.19.2.zip
            plugin: reaper_stem_separation_plugin.dll

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ONNX Runtime
        id: cache-ort
        uses: actions/cache@v4
        with:
          path: ort
          key: ort-${{ matrix.platform }}-${{ env.ORT_VERSION }}

      - name: Download ONNX Runtime
        if: steps.cache-ort.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ort
          cd ort
          if [[ "${{ matrix.ort_asset }}" == *.zip ]]; then
            curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${{ matrix.ort_asset }}" -o ort.zip
            unzip -q ort.zip
            rm ort.zip
          else
            curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${{ matrix.ort_asset }}" | tar xz
          fi

      - name: Set ORT_PREFIX
        shell: bash
        run: echo "ORT_PREFIX=$(pwd)/ort/$(ls ort)" >> "$GITHUB_ENV"

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libeigen3-dev ninja-build

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen ninja

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja make -y

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: bash
        run: make plugin ORT_PREFIX="$ORT_PREFIX" CMAKE_EXTRA="-DDOWNLOAD_REPO=${{ github.repository }} -DDOWNLOAD_TAG=${{ github.event.release.tag_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}
          path: build/${{ matrix.plugin }}

  models:
    runs-on: ubuntu-22.04
    name: Convert models

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build model converter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.models
          tags: models:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Convert all models
        run: docker run --rm -v ${{ github.workspace }}/models:/workspace/models models:latest _models

      - name: Collect model assets
        run: |
          mkdir -p model-assets
          cp models/htdemucs.ort model-assets/
          cp models/htdemucs_6s.ort model-assets/
          cp models/bs_roformer_vocals.onnx model-assets/
          cp models/melband_roformer_vocals.onnx model-assets/
          ls -lh model-assets/

      - uses: actions/upload-artifact@v4
        with:
          name: models
          path: model-assets/*

  upload:
    needs: [build, models]
    runs-on: ubuntu-22.04
    name: Upload release assets

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: reaper_stem_separation_plugin.*

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: models

      - name: Upload plugin binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          for plugin in reaper_stem_separation_plugin.so reaper_stem_separation_plugin.dylib reaper_stem_separation_plugin.dll; do
            if [ -f "artifacts/$plugin/$plugin" ]; then
              echo "Uploading $plugin"
              gh release upload "$TAG" "artifacts/$plugin/$plugin" --repo "$GH_REPO" --clobber
            fi
          done

      - name: Upload model files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          for model in artifacts/models/*; do
            echo "Uploading $model"
            gh release upload "$TAG" "$model" --repo "$GH_REPO" --clobber
          done
